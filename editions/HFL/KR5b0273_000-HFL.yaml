front:
  text: 靈寶歸空訣四八
  hash: sha256:235cab40542a1ffb3ccd853ba5a604183ddef5169db032cb2ec5eed7a21f3cde
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0273_HFL_000-001a, image: hfl/0319/0319-130.png}
body:
  text: 崇文廣道純德法師教門高士原陽子趙宜真編述歌括胎圓神化英雄漢脱體自由無忌憚學人精進了無生行時點檢休撩亂上士丹成道備來去自由我命在我不在天矣中士而下雖能進道當歸空之際必先覺察不至昏迷頂門天鼓若雷轟此是天崩地䧟聲三聲二聲三二載一聲一載也須行歳除夜或毎夜半靜坐攝念觀頂門謂之大明關忽聞聲如腦裂歴歴然如霹靂狀計其聲數以定年限掩耳指擊樓頭鼓恰似鐘聲三載數磬聲一載蟬百日蚯蚓七日身當故歳除夜或毎夜半兩手掩兩耳以二指於腦後畢三十六下如鼓聲則安樂如鐘磬蚯蚓蟬聲則知歸期逺近樓頭天鼓俱不鳴天柱崑崙亦已傾燈前額間看臂大叩齒無聲總去程樓頭鼓即腦後天鼓即項門天柱傾即頭頸弱不能舉一曰崑崙倒又曰須彌倒毎夜澄前竪起左手按自己額間看臂小則吉大則凶前齒爲法鼓叩之不鳴皆是去證暗中挑眼虧光耀耳前脉住收竿釣曹溪水竭華池乾拜澄失影皆歸兆夜半於極暗處以手指挑眼上下無光謂之日月無光是歸候太陽耳前脉不動謂之釣客罷竿是一日候舌下大牙齦後爲華池閉口津液乾謂之曹溪水竭是七日候夜半焚香點澄禮拜回顧身後左右全無影謂之影不隨形是此日候左腎入腹在明朝右入復來待七宵臨行又入緊繋住遺骸不死魂神超外腎子左曰隂母右曰陽公左入小腹去復來則是二朝或對周一日候右入小腹去復來則是七日候左右惧入則半日身亡臨行又復入謂之隂陽催促又曰磐巖當以絹帯或綿繩緊繋住於腿上不令入腹令屍不死五臓中動便是歸寂之時其時性從足下而生從頂門而起即動屍則正心望天門去便尿之際連雙腎縮痛如錐不堪忍男左女右脚剌疼半日去程心按緊雙腎名玉女畫娥眉當便尿之時其腎縮刺痛不可忍謂之地獄關動於忽然男左女右脚剌痛謂之命門絕皆當正坐把定精神牢捉心印不可放逸以手緊緊按心勿令昏亂良久痛止即半日去也徧體如同走螻螘忽然又似一蛇游頻來報應到心上骨節皆疼世事休偏身或脚板如有螘子走或如蛇行行到心中即骨節疼致昏悶如此三五回謂之諸慾離身又曰諸神不在定是不祥須要凝神定心或一念差錯即墮業道不可不謹點撿燒香當夜靜有三兩件歸空證桃湯沐浴便更衣一盞白茶還靜定遇夜洗手浣漱衣冠畢焼夜香依前逐一點檢如有三雨件報應之時便沐浴更衣入室靜坐喫白茶或淨水又有何境象可去則去未可去再喫淨水一二口又定了諸般人物境象來引歸業道受輪回堅持心印休貪著斧劈毋懼毋嫌猜臨命終時眼化爲無名鬼耳化爲阿誰鬼鼻化爲死樹鬼舌化爲快軍鬼身化爲思惟鬼心化爲雌雄鬼一切鬼神盡從心起即非外來先須識破逢諸色佛菩薩師儒等或隊仗迎引皆是天魔外道境逢冤家眷屬或黄赤白路亦是業道魔境逢燈光處是內魔眷屬逢曠野處是人間胎卵逢親戚姊妹是入輪廻胎無胎入野逢簥輦黑白車是牛馬等胎逢殿宇是猪羊胎逢黄衣白服是猫犬胎逢黄旛豹尾是走獸胎逢象是狐胎逢吹簫處是蚯蚓蟬類胎逢鼓樂處是鳥雀蟲螘胎逢花街柳巷是蛇胎逢市井關闠人物徃来之地或黑白青紫並是畜生道逢酒肉飲食之類是餓鬼道聞妙香是天人胎逢父母眷屬處是六慾天發做里社廟神逢金甲神人教請是人天大福血食神如前諸色神人境物並是自家神識誘引外魔即非正道不得亂捨去來不怕不嫌不取不愛若差一念便落他胎氣斷之際或如斧劈也莫驚恐正昏㸃時不得逃竄務要牢捉心印如如不動良久自定只見雷大電光路日光毫光十丈度將身猛去不動心即證人天歸淨土唯此四境可行必歸善道逢著隂人過茶湯迷魂之藥不可嘗此境若還牢記得能通宿命永無忘逢婦人過茶湯或施或賣若受而食之便墮惡道決定不食而𥩈傾棄之則當來通宿命矣四輩髙人學仙佛迟速無常莫輕忽輪廻百刼萬苦辛六賊三屍恣顛踣四軰者謂道教中有出家男官道士有出家女官道士有在家男官道士有在家女官道士釋教中則出家者男曰比丘女曰比丘尼在家者男曰優婆塞女曰優婆夷昔天尊世尊説法時會中皆有此四軰人聽法也無常者謂幻假色身未免敗壞不長久也六賊即六慾之謂也真性如如非動非靜感物而應在眼根能視則貪慾色塵在耳根能聽則貪慾聲塵在鼻根能嗅則貪慾香塵在舌根能言能食則貪慾滋味在身根能運動則貪慾非爲在意根能出謀應事則貪慾顛倒夢想如是六塵既入於六根六慾因之而熾盛障迷自性故以賊名情慾盛則精魄結而爲三屍蟲致人貪愛無厭顛倒夢想流浪死生展轉輪廻受諸苦惱無有已時直須勇猛賽關張不動干戈已伏降四海清平歸有道聽命無生大法王自性法身本無生滅迎之不見其首随之不見其後輝今耀古卓然獨存唯其汨於根塵引入諸趣迷惑本來若能奮勇猛火智慧力勘破根塵則情慾頓消法身自見從他四大敗壞於我了不相干此所謂無生大法王也後序夫人生受形既有成住不免壞空百歳光隂過眼如夢命終之際情識昏迷則随其業習淪入諸趣無有出期此所謂無常迅速生死事大而歸空之法有自来矣恪傳以爲逹摩禪師之作予觀其文義訛舛不倫不類大乘菩薩語句況逹摩西來不立文字得非後人所撰假大名以取信乎今因舊本叅以異聞正誤删繁序爲七言歌括一篇凡十四章章四句以使記憶仍就毎章附注務得其詳有縁遇者寶而祕之毋成輕泄急宜猛省識破幼縁對境忘境廣行方便多種善根於十二時中四威儀内堅持戒定勿助勿忘真積力行則本來慧性一旦開明直下承當自作主宰時節到來把定玄關驗其消息撒乎便行斯乃大丈夫能事而歸空之法不爲無所濟矣抑嘗見仙佛中或有不幸者如景純郭真人既悟真常之道而不免枉遭刑戮直道中義竟以㓙終大慧禪師既明正法眼藏而不免疽發於背洞見五臓竟以苦終人海中或有僥倖者愚夫愚婦汨沒塵勞素無修習而能先知去候脱然令終是皆宿令定業各随縁分順償凡俗罔知寧不以彼此令終㓙終爲口實而𥩈議之多見其不智須知明眼髙人性天已徹縱遇風刀常坦坦假饒毒藥也閑閑自性法身逍遥世外設或塵情未滌道眼未明運應滅時還如夢中不知是夢難忘熟境随順冥行畢竟迷悟不同聖凡有間惟學仙學佛四輩髙人撫幻景之倐遷脱苦輪之未易回頭在早覺岸同登不亦善哉是故爲之序併説偈曰生死無常本不干只因貪著致多端歸空有法原非法日向東西一樣圍靈寳歸空訣
